name: Windows CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.9.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: CSP-Grayscale-Viewer-Release
          path: |
            build/Release/CSP-Grayscale-Viewer.exe
            build/Release/CSP-Grayscale-Viewer_Console.exe
