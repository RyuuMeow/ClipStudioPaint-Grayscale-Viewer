name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.9.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force deploy | Out-Null
          Copy-Item build\Release\CSP-Grayscale-Viewer.exe deploy\
          Copy-Item build\Release\CSP-Grayscale-Viewer_Console.exe deploy\
          windeployqt --release --no-translations --no-opengl-sw deploy\CSP-Grayscale-Viewer.exe

      - name: Compile installer
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: Output/CSP-Grayscale-Viewer_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
